name: Security Scan

on:
  workflow_call:
    inputs:
      language:
        description: 'Primary language for CodeQL analysis'
        type: string
        required: true
      codeql-queries:
        description: 'CodeQL query suite'
        type: string
        default: 'security-extended'
      enable-dependency-review:
        description: 'Enable dependency review on PRs'
        type: boolean
        default: true
      runs-on:
        description: 'Runner label'
        type: string
        default: 'ubuntu-latest'

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  codeql-analysis:
    name: CodeQL Analysis (${{ inputs.language }})
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.language }}"

  dependency-review:
    name: Dependency Review
    runs-on: ${{ inputs.runs-on }}
    if: inputs.enable-dependency-review && github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
